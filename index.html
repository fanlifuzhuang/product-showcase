<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ashley Miller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #faf8f5;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px;
            background: #fff;
            border-bottom: 1px solid #e8e0d8;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 6px;
            color: #1a1a1a;
        }

        .brand-nav {
            background: #fff;
            padding: 16px 20px;
            border-bottom: 1px solid #ece6e0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px 24px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand-nav button {
            background: none;
            border: none;
            padding: 8px 4px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #777;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.25s ease;
            letter-spacing: 1px;
        }

        .brand-nav button:hover {
            color: #000;
        }

        .brand-nav button.active {
            color: #000;
            border-bottom-color: #8a6e5a;
        }

        .photo-grid {
            max-width: 1400px;
            margin: 30px auto 50px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .photo-grid img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            background: #f0ebe5;
            border-radius: 4px;
            transition: transform 0.3s ease;
        }

        .photo-grid img:hover {
            transform: scale(1.02);
        }

        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: #ccc;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        footer {
            text-align: center;
            padding: 30px 20px 40px;
            border-top: 1px solid #ece6e0;
            background: #fff;
        }

        footer a {
            display: inline-block;
            background: #25d366;
            color: #fff;
            padding: 12px 36px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: background 0.3s;
        }

        footer a:hover {
            background: #1ebe5c;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 2rem;
                letter-spacing: 3px;
            }
            .brand-nav {
                gap: 6px 14px;
                padding: 12px 10px;
            }
            .brand-nav button {
                font-size: 0.8rem;
                padding: 6px 2px;
            }
            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
                padding: 0 12px;
                margin: 20px auto 30px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Ashley Miller</h1>
</header>

<nav class="brand-nav" id="brandNav">
    <button class="active" data-brand="all">全部</button>
    <button data-brand="balenciaga">Balenciaga</button>
    <button data-brand="chanel">Chanel</button>
    <button data-brand="dior">Dior</button>
    <button data-brand="gucci">Gucci</button>
    <button data-brand="hermes">Hermès</button>
    <button data-brand="lv">LV</button>
    <button data-brand="miumiu">Miu Miu</button>
</nav>

<div class="photo-grid" id="photoGrid"></div>

<footer>
    <a href="https://wa.me/8613692961375" target="_blank">📩 WhatsApp +86 136 9296 1375</a>
</footer>

<script>
    // ================================================================
    //  ⚠️ 只需要改下面每个品牌括号里的数字 = 你文件夹里的照片数量
    //  比如 balenciaga 文件夹有 300 张照片，就写 300
    //  暂时没有照片就写 0
    // ================================================================

    function generatePhotos(brand, count) {
        const list = [];
        for (let i = 1; i <= count; i++) {
            list.push(`images/${brand}/1 (${i}).jpg`);
        }
        return list;
    }

    const photos = {
        balenciaga: generatePhotos('balenciaga', 300),   // ← 改成你的数量
        chanel: generatePhotos('chanel', 300),            // ← 改成你的数量
        dior: generatePhotos('dior', 300),                // ← 改成你的数量
        gucci: generatePhotos('gucci', 300),              // ← 改成你的数量
        hermes: generatePhotos('hermes', 300),            // ← 改成你的数量
        lv: generatePhotos('lv', 436),                    // ← 改成你的数量
        miumiu: generatePhotos('miumiu', 300),            // ← 改成你的数量
    };

    // ================================================================
    //  下面不用改
    // ================================================================

    const grid = document.getElementById('photoGrid');
    const nav = document.getElementById('brandNav');

    function render(brand) {
        grid.innerHTML = '';
        const list = brand === 'all'
            ? Object.values(photos).flat()
            : photos[brand] || [];

        if (list.length === 0) {
            grid.innerHTML = `<div class="empty">该品牌暂无照片</div>`;
            return;
        }

        list.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            img.alt = '';
            img.loading = 'lazy';
            img.onerror = function() {
                this.style.background = '#f0ebe5';
                this.style.minHeight = '200px';
            };
            grid.appendChild(img);
        });
    }

    function setBrand(brand) {
        render(brand);
        document.querySelectorAll('.brand-nav button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.brand === brand);
        });
    }

    nav.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (btn) setBrand(btn.dataset.brand);
    });

    render('all');
</script>

</body>
</html>
